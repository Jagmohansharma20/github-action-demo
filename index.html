<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Action Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background: #24292e;
      color: white;
      padding: 20px;
    }
    h1 {
      margin: 0;
      font-size: 2em;
    }
    .container {
      margin: 40px auto;
      max-width: 600px;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #2ea44f;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #22863a;
    }
    footer {
      margin-top: 40px;
      padding: 10px;
      font-size: 0.9em;
      color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1>🚀 GitHub Action Demo Page</h1>
  </header>

  <div class="container">
    <p>This is a simple static page deployed using GitHub Actions.</p>
    <p>It demonstrates how CI/CD can automatically build and publish your site.</p>
    <a href="https://github.com" class="btn">View on GitHub</a>
  </div>

  <footer>
    &copy; 2026 Demo Project
  </footer>
</body>
</html>
